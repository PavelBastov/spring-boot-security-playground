<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Auth-aware navigation bar, reused on every page via th:replace -->
<nav class="nav" th:fragment="nav">
    <a class="nav__brand" th:href="@{/}">
        <span class="dot"></span> Security Playground
    </a>

    <span class="nav__spacer"></span>

    <a class="navlink" th:href="@{/public}">Public</a>

    <!-- Anonymous visitors -->
    <th:block sec:authorize="!isAuthenticated()">
        <a class="navlink" th:href="@{/login}">Log in</a>
    </th:block>

    <!-- Authenticated users -->
    <th:block sec:authorize="isAuthenticated()">
        <a class="navlink" th:href="@{/profile}">Profile</a>
        <a class="navlink" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
        <span class="nav__user">
            <span sec:authentication="name">user</span>
            <span class="badge" sec:authorize="hasRole('USER')">User</span>
            <span class="badge badge--admin" sec:authorize="hasRole('ADMIN')">Admin</span>
        </span>
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button class="btn--ghost" type="submit">Log out</button>
        </form>
    </th:block>
</nav>

</body>
</html>
